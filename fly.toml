# Fly.io configuration for Blask

app = "blask"
primary_region = "iad"

[build]

[env]
  PORT = "8501"

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[services]]
  http_checks = []
  internal_port = 8501
  processes = ["app"]
  protocol = "tcp"
  script_checks = []
